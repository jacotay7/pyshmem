name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]
      - name: Run lint
        run: ruff check .
      - name: Run CPU test suite
        run: pytest -m "cpu and not benchmark"
      - name: Run benchmark smoke
        env:
          PYSHARE_ENFORCE_BENCHMARK: "0"
          PYSHARE_TARGET_HZ: "50000"
        run: pytest -m "cpu and benchmark" -q -s
